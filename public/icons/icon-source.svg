<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: dark navy with subtle gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1729;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0e1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chartLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  
  <!-- Sun in upper portion -->
  <circle cx="180" cy="180" r="52" fill="url(#sunGrad)"/>
  
  <!-- Sun rays -->
  <g stroke="url(#sunGrad)" stroke-width="10" stroke-linecap="round">
    <line x1="180" y1="100" x2="180" y2="118"/>
    <line x1="180" y1="242" x2="180" y2="260"/>
    <line x1="100" y1="180" x2="118" y2="180"/>
    <line x1="242" y1="180" x2="260" y2="180"/>
    <line x1="124" y1="124" x2="137" y2="137"/>
    <line x1="223" y1="223" x2="236" y2="236"/>
    <line x1="124" y1="236" x2="137" y2="223"/>
    <line x1="223" y1="137" x2="236" y2="124"/>
  </g>
  
  <!-- Cloud overlapping sun -->
  <g fill="#cbd5e1" opacity="0.95">
    <ellipse cx="290" cy="220" rx="48" ry="38"/>
    <ellipse cx="240" cy="235" rx="42" ry="32"/>
    <ellipse cx="335" cy="240" rx="38" ry="30"/>
    <rect x="240" y="235" width="100" height="30" rx="15"/>
  </g>
  
  <!-- Chart/trend line at bottom -->
  <g fill="none" stroke="url(#chartLine)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="80,400 160,360 220,380 290,310 370,340 432,270"/>
  </g>
  
  <!-- Data point dots on chart -->
  <g fill="#10b981">
    <circle cx="80" cy="400" r="9"/>
    <circle cx="160" cy="360" r="9"/>
    <circle cx="220" cy="380" r="9"/>
    <circle cx="290" cy="310" r="9"/>
    <circle cx="370" cy="340" r="9"/>
    <circle cx="432" cy="270" r="11" fill="#34d399"/>
  </g>
</svg>
